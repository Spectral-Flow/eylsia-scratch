name: Server CI

on:
  push:
    branches: [ main, develop ]
    paths: [ 'server/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'server/**' ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      working-directory: ./server
      run: bun install --frozen-lockfile

    - name: Type check
      working-directory: ./server
      run: bun run typecheck

    - name: Lint
      working-directory: ./server
      run: bun run lint

    - name: Build
      working-directory: ./server
      run: bun run build

    - name: Test server startup
      working-directory: ./server
      run: |
        timeout 10s bun run start &
        sleep 5
        curl -f http://localhost:3000/health || exit 1
        curl -f "http://localhost:3000/api/hello?name=CI" || exit 1

  docker:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: ./server
        push: false
        tags: elysia-demo:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        docker run -d --name test-server -p 3000:3000 elysia-demo:${{ github.sha }}
        sleep 10
        curl -f http://localhost:3000/health || exit 1
        docker stop test-server